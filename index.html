<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <title>Calculator</title>
</head>
<body>
  <div class="calculator">
    <div class="row row1">
      <div class="input"><input type="text" class="screen"></div>
    </div>
    <div class="row row2" id="row2">
      <div class="text"><p class="name">Calculator</p></div>
      <div class="clear"><button class="button clearbtn">C</button></div>
    </div>
    <div class="row row3">
      <div class="7"><button class="button number 7btn">7</button></div>
      <div class="8"><button class="button number 8btn">8</button></div>
      <div class="9"><button class="button number 9btn">9</button></div>
      <div class="plus"><button class="button operator plusbtn">+</button></div>
    </div>
    <div class="row row4">
      <div class="4"><button class="button number 4btn">4</button></div>
      <div class="5"><button class="button number 5btn">5</button></div>
      <div class="6"><button class="button number 6btn">6</button></div>
      <div class="minus"><button class="button operator minusbtn">-</button></div>
    </div>
    <div class="row row5">
      <div class="1"><button class="button number 1btn">1</button></div>
      <div class="2"><button class="button number 2btn">2</button></div>
      <div class="3"><button class="button number 3btn">3</button></div>
      <div class="multiply"><button class="button operator multiplybtn">x</button></div>
    </div>
    <div class="row row6">
      <div class="0"><button class="button number 0btn">0</button></div>
      <div class="decimal"><button class="button number decimalbtn">.</button></div>
      <div class="equal"><button class="button equalbtn">=</button></div>
      <div class="divide"><button class="button operator dividebtn">/</button></div>
    </div>  
  </div>
 <script src="./javascript.js"></script> 
</body>
</html>
