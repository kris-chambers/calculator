<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <title>Calculator</title>
</head>
<body>
  <div class="calculator">
    <div class="row1">
      <div class="screen"></div>
    </div>
    <div class="row2">
      <div class="clear"><button class="clearbtn">C</button></div>
    </div>
    <div class="row3">
      <div class="7"><button class="7btn">7</button></div>
      <div class="8"><button class="8btn">8</button></div>
      <div class="9"><button class="9btn">9</button></div>
      <div class="plus"><button class="plusbtn">+</button></div>
    </div>
    <div class="row4">
      <div class="4"><button class="4btn">4</button></div>
      <div class="5"><button class="5btn">5</button></div>
      <div class="6"><button class="6btn">6</button></div>
      <div class="minus"><button class="minusbtn">-</button></div>
    </div>
    <div class="row5">
      <div class="1"><button class="1btn">1</button></div>
      <div class="2"><button class="2btn">2</button></div>
      <div class="3"><button class="3btn">3</button></div>
      <div class="multiply"><button class="multiplybtn">x</button></div>
    </div>
    <div class="row6">
      <div class="0"><button class="0btn">0</button></div>
      <div class="decimal"><button class="decimalbtn">.</button></div>
      <div class="equal"><button class="equalbtn">=</button></div>
      <div class="divide"><button class="dividebtn">/</button></div>
    </div>  
  </div>
 <script src="./javascript.js"></script> 
</body>
</html>
