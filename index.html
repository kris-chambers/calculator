<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <title>Calculator</title>
</head>
<body>
  <div class="calculator">
    <div class="row row1">
      <div class="input"><input type="text" class="screen"></div>
    </div>
    <div class="row row2" id="row2">
      <div class="text"><p class="name">Calculator</p></div>
      <div class="clear"><button id="clear" class="button clearbtn">C</button></div>
    </div>
    <div class="row row3">
      <div class="7"><button id="seven" class="button number">7</button></div>
      <div class="8"><button id="eight" class="button number">8</button></div>
      <div class="9"><button id="nine" class="button number">9</button></div>
      <div class="plus"><button id="plus" class="button operator">+</button></div>
    </div>
    <div class="row row4">
      <div class="4"><button id="four" class="button number">4</button></div>
      <div class="5"><button id="five" class="button number">5</button></div>
      <div class="6"><button id="six" class="button number">6</button></div>
      <div class="minus"><button id="minus" class="button operator">-</button></div>
    </div>
    <div class="row row5">
      <div class="1"><button id="one" class="button number">1</button></div>
      <div class="2"><button id="two" class="button number">2</button></div>
      <div class="3"><button id="three" class="button number">3</button></div>
      <div class="multiply"><button id="multiply" class="button operator">x</button></div>
    </div>
    <div class="row row6">
      <div class="0"><button id="zero" class="button number">0</button></div>
      <div class="decimal"><button id="decimal" class="button number">.</button></div>
      <div class="equal"><button id="equal" class="button equalbtn">=</button></div>
      <div class="divide"><button id="divide" class="button operator">/</button></div>
    </div>  
  </div>
 <script src="./javascript.js"></script> 
</body>
</html>
